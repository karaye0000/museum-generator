<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genius Loci — Museum Site Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#0e5ba3;--bg:#f4f5f7;--card:#fff;--text:#1a1a1a;--muted:#999;--border:#e8e8e8;--radius:16px;--font:'DM Sans',system-ui,sans-serif}
html{font-family:var(--font);color:var(--text);background:linear-gradient(170deg,#f4f5f7,#e9ebf0);min-height:100vh}
body{padding:16px 14px 120px}
.wrap{max-width:460px;margin:0 auto}
.header{text-align:center;padding:20px 0 32px}
.header small{font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:#bbb}
.header h1{font-size:24px;font-weight:700;letter-spacing:-.5px;margin-top:4px}
.header .bar{width:40px;height:3px;border-radius:2px;margin:10px auto 0;transition:background .3s}
.card{background:var(--card);border-radius:var(--radius);padding:22px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.lbl{display:block;font-size:10px;font-weight:700;color:#aaa;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:12px;font-size:15px;outline:none;font-family:var(--font);background:#fafafb;transition:border .2s}
.input:focus{border-color:var(--primary)}
.input-mono{font-family:'SF Mono',Consolas,monospace;font-size:14px}
.color-row{display:flex;align-items:center;gap:10px;margin-top:14px}
.color-swatch{position:relative;width:42px;height:42px;border-radius:12px;overflow:hidden;border:2px solid #eee;flex-shrink:0}
.color-swatch input{position:absolute;inset:-6px;width:calc(100% + 12px);height:calc(100% + 12px);cursor:pointer;border:none}
.color-preview{width:42px;height:42px;border-radius:12px;flex-shrink:0;transition:background .2s}
.logos-row{display:flex;gap:20px;justify-content:center;margin-bottom:18px}
.img-drop{display:flex;flex-direction:column;align-items:center;gap:6px}
.img-drop-zone{border:2px dashed #d4d4d4;border-radius:14px;width:110px;height:110px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:#fafafb;overflow:hidden;transition:all .2s}
.img-drop-zone.drag{border-color:var(--primary);background:#f0f7ff}
.img-drop-zone.has-img{border-color:transparent;background:#f8f8f8}
.img-drop-zone img{max-width:80%;max-height:80%;object-fit:contain}
.img-drop-zone .placeholder{text-align:center}
.img-drop-zone .placeholder .arrow{font-size:24px;opacity:.3}
.img-drop-zone .placeholder .txt{font-size:10px;color:#bbb;margin-top:2px}
.img-drop label{font-size:11px;color:#999;font-weight:500}
.drop-zone{border:2px dashed #d4d4d4;border-radius:14px;padding:28px 16px;text-align:center;cursor:pointer;background:#fafafb;transition:all .2s}
.drop-zone.drag{border-color:var(--primary);background:#f0f7ff}
.drop-zone .icon{font-size:30px;margin-bottom:4px;opacity:.35}
.drop-zone .label{font-size:13px;font-weight:500;color:#777}
.drop-zone .hint{font-size:11px;color:#bbb;margin-top:4px}
.tags{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px}
.tag{display:inline-flex;align-items:center;gap:4px;background:#f2f2f2;border-radius:8px;padding:4px 10px;font-size:11px;color:#555}
.tag .rm{cursor:pointer;color:#bbb;font-weight:700;font-size:13px}
.tag .rm:hover{color:#999}
.success{margin-top:8px;font-size:12px;color:#2e7d32;font-weight:600}
.gen-btn{width:100%;padding:15px 0;border-radius:16px;border:none;font-size:15px;font-weight:600;letter-spacing:.3px;transition:all .25s;font-family:var(--font);margin-top:6px;cursor:pointer}
.gen-btn:disabled{color:#aaa;background:#e4e4e4;cursor:not-allowed;box-shadow:none}
.status{text-align:center;margin-top:12px;font-size:13px;color:#2e7d32;font-weight:600}
input[type="file"]{display:none}
</style>
</head>
<body>

<div class="wrap" id="app">
  <div class="header">
    <small>Genius Loci</small>
    <h1>Museum Site Generator</h1>
    <div class="bar" id="barAccent"></div>
  </div>

  <!-- Name + Color -->
  <div class="card">
    <label class="lbl">Nome del Museo</label>
    <input class="input" id="museumName" placeholder="es. Museo Pignatelli">
    <div class="color-row">
      <label class="lbl" style="margin-bottom:0;flex-shrink:0">Colore</label>
      <div class="color-swatch"><input type="color" id="colorPicker" value="#0e5ba3"></div>
      <input class="input input-mono" id="colorHex" value="#0e5ba3" style="flex:1">
      <div class="color-preview" id="colorPreview"></div>
    </div>
  </div>

  <!-- Logos -->
  <div class="card">
    <label class="lbl">Loghi</label>
    <div class="logos-row">
      <div class="img-drop">
        <div class="img-drop-zone" id="dropGenius">
          <div class="placeholder"><div class="arrow">⬆</div><div class="txt">Upload</div></div>
        </div>
        <label>Genius Loci</label>
        <input type="file" accept="image/*" id="fileGenius">
      </div>
      <div class="img-drop">
        <div class="img-drop-zone" id="dropMuseum">
          <div class="placeholder"><div class="arrow">⬆</div><div class="txt">Upload</div></div>
        </div>
        <label>Museo</label>
        <input type="file" accept="image/*" id="fileMuseum">
      </div>
    </div>
    <label class="lbl">Partner Logos (max 5)</label>
    <div class="drop-zone" id="dropPartners">
      <div class="icon">🏛</div>
      <div class="label">Trascina o clicca</div>
      <div class="hint">PNG o JPG</div>
    </div>
    <div class="tags" id="partnerTags"></div>
    <input type="file" accept="image/*" multiple id="filePartners">
  </div>

  <!-- CSV -->
  <div class="card">
    <label class="lbl">Dati Pannelli</label>
    <div class="drop-zone" id="dropCSV">
      <div class="icon">📋</div>
      <div class="label">Trascina il CSV o clicca</div>
      <div class="hint">Formato con separatore ;</div>
    </div>
    <div class="tags" id="csvTags"></div>
    <div class="success" id="csvCount" style="display:none"></div>
    <input type="file" accept=".csv" id="fileCSV">
  </div>

  <!-- Audio -->
  <div class="card">
    <label class="lbl">File Audio</label>
    <div class="drop-zone" id="dropAudio">
      <div class="icon">🎧</div>
      <div class="label">Trascina MP3 o clicca</div>
      <div class="hint">Puoi aggiungere file più volte</div>
    </div>
    <div class="tags" id="audioTags"></div>
    <input type="file" accept=".mp3" multiple id="fileAudio">
  </div>

  <!-- Generate -->
  <button class="gen-btn" id="genBtn" disabled>Scarica ....zip</button>
  <div class="status" id="statusText"></div>
</div>

<script>
// ─── Templates ───
const TCSS=`/* Museum Guide — Genius Loci */\n:root{--color-primary:__PRIMARY__;--color-primary-light:__PRIMARY_LIGHT__;--color-text:#333;--color-text-light:#999;--color-bg:#fff;--color-overlay:rgba(0,0,0,.5);--header-height:92px;--font-family:'Kanit',sans-serif}*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}body{font-family:var(--font-family);font-weight:400;color:var(--color-text);background-color:var(--color-bg);line-height:1.6;overflow-x:hidden;padding-top:var(--header-height)}img{max-width:100%;height:auto;display:block}a{text-decoration:none;color:inherit}button{font-family:var(--font-family);cursor:pointer;border:none;background:none}.header{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--color-bg);box-shadow:0 6px 30px rgba(0,0,0,.13);height:var(--header-height)}.header-inner{display:flex;align-items:center;justify-content:space-between;height:100%;padding:0 20px;max-width:700px;margin:0 auto}.logo-museum{height:52px;width:auto}.logo-genius{height:48px;width:auto}.header-logo-center{position:absolute;left:50%;transform:translateX(-50%)}.burger-btn{display:flex;flex-direction:column;justify-content:center;gap:5px;width:32px;height:32px;padding:4px}.burger-btn span{display:block;width:100%;height:2.5px;background-color:var(--color-text);border-radius:2px;transition:all .3s ease}.menu-overlay{position:fixed;inset:0;background:var(--color-overlay);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s ease}.menu-overlay.active{opacity:1;pointer-events:auto}.burger-menu{position:fixed;top:0;right:0;bottom:0;width:80%;max-width:320px;background:var(--color-bg);z-index:300;transform:translateX(100%);transition:transform .3s ease;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px 24px 40px}.burger-menu.active{transform:translateX(0)}.menu-header{display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:32px}.menu-logo{height:48px;width:auto}.menu-close{position:absolute;right:0;font-size:32px;line-height:1;color:var(--color-text);padding:4px}.menu-list{list-style:none}.menu-list li{margin-bottom:4px}.menu-link{display:block;padding:10px 0;font-weight:500;font-size:14px;letter-spacing:.5px;color:var(--color-text);transition:color .2s ease;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.menu-link:active{color:var(--color-primary)}.menu-divider{height:1px;background:#e0e0e0;margin:12px 0}.menu-group-title{padding:12px 0 4px;font-weight:600;font-size:12px;letter-spacing:1px;color:var(--color-primary);text-transform:uppercase}.main-content{max-width:700px;margin:0 auto}.section{padding:60px 20px}.section-divider{height:0;border:none;border-top:1px solid #f0f0f0;box-shadow:0 6px 18px rgba(0,0,0,.18);margin:0}.room-title{font-size:26px;font-weight:500;text-align:center;margin-bottom:24px;letter-spacing:.3px}.section-title{font-size:26px;font-weight:500;text-align:center;margin-bottom:28px}.expandable{margin-bottom:16px}.expandable-preview{display:block}.expandable-full{display:none}.expandable.open .expandable-preview{display:none}.expandable.open .expandable-full{display:block}.expandable-teaser{font-size:16px;font-weight:400;color:var(--color-text);line-height:1.6;text-align:center}.expandable-full p{font-size:16px;font-weight:400;color:var(--color-text);line-height:1.7;margin-bottom:12px;text-align:center}.expandable-full p:last-child{margin-bottom:0}.expandable-toggle{display:block;width:100%;font-size:16px;font-weight:400;color:#b0b0b0;padding:6px 0;background:none;border:none;text-align:center;transition:color .2s ease}.expandable-toggle:active{color:var(--color-text-light)}.btn{display:block;width:fit-content;margin:0 auto;padding:14px 36px;font-family:var(--font-family);font-size:20px;font-weight:500;text-align:center;border-radius:12px;transition:all .2s ease}.btn-audio-support,.btn-smart-map{background:var(--color-bg);color:var(--color-text);border:1px solid #e0e0e0;box-shadow:0 2px 8px rgba(0,0,0,.08)}.btn-audio-support:active,.btn-smart-map:active{background:var(--color-primary);color:#fff;border-color:var(--color-primary);box-shadow:0 2px 12px rgba(0,0,0,.2)}.room-buttons{display:flex;flex-direction:column;align-items:center;gap:20px;margin-top:30px}.room-buttons .btn{width:220px}.audio-section{padding:60px 20px}.audio-block{margin-bottom:28px}.audio-lang{font-size:16px;font-weight:500;margin-bottom:10px}.audio-player{width:100%;height:44px;border-radius:8px}audio::-webkit-media-controls-panel{background:#f5f5f5}.footer{padding:60px 20px 20px;text-align:center}.footer-text{font-size:16px;font-weight:500;line-height:1.7;color:var(--color-text);margin-bottom:45px}.footer-logo{margin-bottom:75px;display:flex;justify-content:center}.footer-logo .logo-genius{height:34px}.footer-partners{display:flex;align-items:center;justify-content:space-between;flex-wrap:nowrap;padding:0 20px;margin-bottom:20px}.partner-logo{height:26px;width:auto;object-fit:contain;flex-shrink:1;min-width:0}.back-to-top{position:fixed;bottom:24px;right:20px;width:48px;height:48px;border-radius:50%;background:rgba(158,158,158,.6);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.15);z-index:50;opacity:0;pointer-events:none;transition:opacity .3s ease}.back-to-top.visible{opacity:1;pointer-events:auto}.back-to-top:active{background:rgba(158,158,158,.85)}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px}`;

const THTML=`<!DOCTYPE html>\n<html lang="it">\n<head>\n  <meta charset="UTF-8" />\n  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />\n  <title>__TITLE__ — Genius Loci</title>\n  <meta name="theme-color" content="__PRIMARY__" />\n  <link rel="preconnect" href="https://fonts.googleapis.com" />\n  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />\n  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />\n  <link rel="stylesheet" href="./css/style.css" />\n</head>\n<body>\n  <header class="header" id="top"><div class="header-inner"><div class="header-logo-left"><img src="./images/museum-logo.png" alt="Museum Logo" class="logo-museum" /></div><div class="header-logo-center"><img src="./images/genius-loci-logo.png" alt="Genius Loci" class="logo-genius" /></div><button class="burger-btn" id="burgerBtn" aria-label="Open menu"><span></span><span></span><span></span></button></div></header>\n  <div class="menu-overlay" id="menuOverlay"></div>\n  <nav class="burger-menu" id="burgerMenu"><div class="menu-header"><img src="./images/genius-loci-logo.png" alt="Genius Loci" class="menu-logo" /><button class="menu-close" id="menuClose" aria-label="Close menu">&times;</button></div><ul class="menu-list" id="menuList"></ul></nav>\n  <main class="main-content"><section class="section room-section" id="roomSection"><h2 class="room-title" id="roomTitle"></h2><div class="expandable" data-lang="it"><div class="expandable-preview"><p class="expandable-teaser" id="itPreview"></p></div><div class="expandable-full" id="itFull"></div><button class="expandable-toggle" data-more="Leggi di più" data-less="Leggi di meno">Leggi di più</button></div><div class="expandable" data-lang="en"><div class="expandable-preview"><p class="expandable-teaser" id="enPreview"></p></div><div class="expandable-full" id="enFull"></div><button class="expandable-toggle" data-more="Read More" data-less="Read Less">Read More</button></div><div class="room-buttons"><a href="#audio-support" class="btn btn-audio-support">Audio Support</a><a href="#" id="smartMapBtn" class="btn btn-smart-map">Smart Map</a></div></section><div class="section-divider"></div><section class="section audio-section" id="audio-support"><h2 class="section-title">Audio Support</h2><div class="audio-block"><h3 class="audio-lang">Italiano</h3><audio id="audioIt" controls preload="auto" class="audio-player"></audio></div><div class="audio-block"><h3 class="audio-lang">English</h3><audio id="audioEn" controls preload="auto" class="audio-player"></audio></div></section><div class="section-divider"></div></main>\n  <footer class="footer"><p class="footer-text">Genius Loci è un progetto finanziato dal PNRR nell\\u2019ambito di Next Generation Eu (PNRR Missione 1 Componente 3 Investimento 1.2 Rimozione delle barriere fisiche e cognitive in musei, biblioteche e archivi, Progetto Musei con tutti. Per il miglioramento dell\\u2019accessibilità culturale e sensoriale nei musei della DRM Campania Finanziato dall\\u2019Unione Europea Next Generation Eu).</p><div class="footer-logo"><img src="./images/genius-loci-logo.png" alt="Genius Loci" class="logo-genius" /></div><div class="footer-partners"><img src="./images/partner-1.png" alt="Partner 1" class="partner-logo" /><img src="./images/partner-2.png" alt="Partner 2" class="partner-logo" /><img src="./images/partner-3.png" alt="Partner 3" class="partner-logo" /><img src="./images/partner-4.png" alt="Partner 4" class="partner-logo" /><img src="./images/partner-5.png" alt="Partner 5" class="partner-logo" /></div></footer>\n  <button class="back-to-top" id="backToTop" aria-label="Back to top"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg></button>\n  <script src="./js/app.js"><\/script>\n</body>\n</html>`;

const TJS=`document.addEventListener('DOMContentLoaded',async()=>{let rooms=[];try{const res=await fetch('./data/rooms.json');rooms=await res.json()}catch(e){console.error('Failed to load rooms.json:',e)}const params=new URLSearchParams(window.location.search);const roomId=params.get('room')||(rooms.length>0?rooms[0].id:null);const currentRoom=rooms.find(r=>r.id===roomId);if(currentRoom){document.getElementById('roomTitle').innerHTML=currentRoom.title;document.getElementById('itPreview').textContent=currentRoom.it_preview;document.getElementById('itFull').innerHTML=currentRoom.it_full;document.getElementById('enPreview').textContent=currentRoom.en_preview;document.getElementById('enFull').innerHTML=currentRoom.en_full;document.getElementById('audioIt').src=currentRoom.audio_it;document.getElementById('audioEn').src=currentRoom.audio_en;const smartMapBtn=document.getElementById('smartMapBtn');if(currentRoom.smart_map){smartMapBtn.href=currentRoom.smart_map;smartMapBtn.target='_blank';smartMapBtn.rel='noopener noreferrer'}else{smartMapBtn.style.display='none'}const plainTitle=currentRoom.title.replace(/<br>/g,' — ');document.title=plainTitle+' — Genius Loci'}const menuList=document.getElementById('menuList');const noLocation=rooms.filter(r=>!r.location);const withLocation=rooms.filter(r=>r.location);const locationOrder=[];withLocation.forEach(r=>{if(!locationOrder.includes(r.location))locationOrder.push(r.location)});noLocation.forEach(room=>{const li=document.createElement('li');const a=document.createElement('a');a.href='?room='+room.id;a.className='menu-link';a.textContent=room.title.replace(/<br>/g,' — ');if(room.id===roomId)a.style.color='var(--color-primary)';li.appendChild(a);menuList.appendChild(li)});if(noLocation.length>0&&locationOrder.length>0){const div=document.createElement('li');div.className='menu-divider';menuList.appendChild(div)}locationOrder.forEach((loc,idx)=>{const titleLi=document.createElement('li');titleLi.className='menu-group-title';titleLi.textContent=loc.toUpperCase();menuList.appendChild(titleLi);const groupRooms=withLocation.filter(r=>r.location===loc);groupRooms.forEach(room=>{const li=document.createElement('li');const a=document.createElement('a');a.href='?room='+room.id;a.className='menu-link';a.textContent=room.title.replace(/<br>/g,' — ');if(room.id===roomId)a.style.color='var(--color-primary)';li.appendChild(a);menuList.appendChild(li)});if(idx<locationOrder.length-1){const div=document.createElement('li');div.className='menu-divider';menuList.appendChild(div)}});const burgerBtn=document.getElementById('burgerBtn');const burgerMenu=document.getElementById('burgerMenu');const menuOverlay=document.getElementById('menuOverlay');const menuClose=document.getElementById('menuClose');function openMenu(){burgerMenu.classList.add('active');menuOverlay.classList.add('active');document.body.style.overflow='hidden'}function closeMenu(){burgerMenu.classList.remove('active');menuOverlay.classList.remove('active');document.body.style.overflow=''}burgerBtn.addEventListener('click',openMenu);menuClose.addEventListener('click',closeMenu);menuOverlay.addEventListener('click',closeMenu);document.querySelectorAll('.expandable-toggle').forEach(toggle=>{toggle.addEventListener('click',()=>{const parent=toggle.closest('.expandable');const isOpen=parent.classList.contains('open');if(isOpen){parent.classList.remove('open');toggle.textContent=toggle.dataset.more}else{parent.classList.add('open');toggle.textContent=toggle.dataset.less}})});const backToTop=document.getElementById('backToTop');window.addEventListener('scroll',()=>{if(window.scrollY>400)backToTop.classList.add('visible');else backToTop.classList.remove('visible')},{passive:true});backToTop.addEventListener('click',()=>{window.scrollTo({top:0,behavior:'smooth'})});document.querySelectorAll('.btn-audio-support').forEach(btn=>{btn.addEventListener('click',e=>{e.preventDefault();const s=document.getElementById('audio-support');if(s){const offset=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--header-height'))||92;const top=s.getBoundingClientRect().top+window.pageYOffset-offset-8;window.scrollTo({top,behavior:'smooth'})}})})});`;

// ─── CSV Parser ───
function parseCSV(t,d=";"){const rows=[];let c="",q=false,row=[];for(let i=0;i<t.length;i++){const ch=t[i];if(q){if(ch==='"'&&t[i+1]==='"'){c+='"';i++}else if(ch==='"'){q=false}else{c+=ch}}else{if(ch==='"'){q=true}else if(ch===d){row.push(c);c=""}else if(ch==="\n"||ch==="\r"){if(ch==="\r"&&t[i+1]==="\n")i++;row.push(c);c="";if(row.length>1||row[0]!=="")rows.push(row);row=[]}else{c+=ch}}}row.push(c);if(row.length>1||row[0]!=="")rows.push(row);return rows}

function csvToRooms(csv){const rows=parseCSV(csv);if(rows.length<2)return[];const h=rows[0].map(x=>x.trim());const g=n=>h.indexOf(n);const pi=g("Pannello"),li=g("Location"),ni=g("Sezione Principale - Nome Pannello"),ci=g("Sezione Principale - Citazione"),ti=g("Sezione Principale - Traduzione"),si=g("Sezione Smart Map - URL"),ai=g("Audio ITA"),ae=g("Audio ENG");return rows.slice(1).map(row=>{const v=i=>(i>=0&&row[i]?row[i]:"").trim();const title=v(ni).replace(/\n/g,"<br>").replace(/(<br>)+$/,"");const toP=t=>t.split(/\n\n+/).filter(Boolean).map(b=>b.split("\n").filter(l=>l.trim()).map(l=>l.trim()).join("<br>"));const prev=ps=>{if(!ps.length)return"";const p=ps.join(" ").replace(/<br>/g," ").replace(/\s+/g," ").trim();const m=p.match(/^.{30,}?\./);return m?m[0]:p.length>80?p.slice(0,80)+"...":p};const itP=toP(v(ci)),enP=toP(v(ti));const aIt=v(ai),aEn=v(ae),pan=v(pi);return{id:pan,location:v(li),title,it_preview:prev(itP),it_full:itP.map(p=>"<p>"+p+"</p>").join("\n"),en_preview:prev(enP),en_full:enP.map(p=>"<p>"+p+"</p>").join("\n"),audio_it:aIt?"./audio/"+aIt:"./audio/"+pan+"-it.mp3",audio_en:aEn?"./audio/"+aEn:"./audio/"+pan+"-en.mp3",smart_map:v(si)}})}

const f2b=f=>new Promise(r=>{const rd=new FileReader();rd.onload=()=>r(rd.result.split(",")[1]);rd.readAsDataURL(f)});
const lighten=(hex,a=30)=>{hex=hex.replace("#","");return"#"+[0,2,4].map(i=>Math.min(255,parseInt(hex.substr(i,2),16)+a).toString(16).padStart(2,"0")).join("")};

// ─── State ───
let state={name:"",color:"#0e5ba3",geniusLogo:null,museumLogo:null,partners:[],csv:null,audio:[],roomCount:0};

// ─── DOM refs ───
const $=id=>document.getElementById(id);
const bar=$('barAccent'), nameInput=$('museumName'), colorPicker=$('colorPicker'), colorHex=$('colorHex'), colorPrev=$('colorPreview');
const genBtn=$('genBtn'), statusText=$('statusText');

function updateColor(c){state.color=c;colorPicker.value=c;colorHex.value=c;colorPrev.style.background=c;bar.style.background=c;if(state.name)genBtn.style.background=c;genBtn.style.boxShadow=state.name&&state.csv?`0 6px 20px ${c}35`:'none'}
function updateBtn(){const ok=state.name&&state.csv;genBtn.disabled=!ok;genBtn.textContent=ok?`Scarica ${state.name}.zip`:'Scarica ....zip';genBtn.style.color=ok?'#fff':'#aaa';genBtn.style.background=ok?state.color:'#e4e4e4';genBtn.style.boxShadow=ok?`0 6px 20px ${state.color}35`:'none'}

updateColor("#0e5ba3");
nameInput.addEventListener('input',()=>{state.name=nameInput.value.trim();updateBtn()});
colorPicker.addEventListener('input',e=>updateColor(e.target.value));
colorHex.addEventListener('input',e=>{if(/^#[0-9a-fA-F]{6}$/.test(e.target.value))updateColor(e.target.value)});

// ─── Image drop helpers ───
function setupImageDrop(dropId,fileId,key){
  const drop=$(dropId),inp=$(fileId);
  const handle=f=>{if(!f)return;state[key]=f;const rd=new FileReader();rd.onload=e=>{drop.innerHTML=`<img src="${e.target.result}">`;drop.classList.add('has-img')};rd.readAsDataURL(f)};
  drop.addEventListener('click',()=>inp.click());
  drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('drag')});
  drop.addEventListener('dragleave',()=>drop.classList.remove('drag'));
  drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('drag');handle(e.dataTransfer.files[0])});
  inp.addEventListener('change',()=>{handle(inp.files[0])});
}
setupImageDrop('dropGenius','fileGenius','geniusLogo');
setupImageDrop('dropMuseum','fileMuseum','museumLogo');

// ─── Multi-file drop helpers ───
function setupMultiDrop(dropId,fileId,stateKey,tagsId,accept){
  const drop=$(dropId),inp=$(fileId),tags=$(tagsId);
  const render=()=>{tags.innerHTML=state[stateKey].map((f,i)=>`<span class="tag">${f.name.length>28?f.name.slice(0,25)+'...':f.name}<span class="rm" data-i="${i}">×</span></span>`).join('');tags.querySelectorAll('.rm').forEach(el=>el.addEventListener('click',()=>{state[stateKey].splice(+el.dataset.i,1);render()}))};
  const add=files=>{const names=state[stateKey].map(f=>f.name);const filtered=Array.from(files).filter(f=>!names.includes(f.name)&&(!accept||f.name.toLowerCase().match(accept)));state[stateKey].push(...filtered);render()};
  drop.addEventListener('click',()=>inp.click());
  drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('drag')});
  drop.addEventListener('dragleave',()=>drop.classList.remove('drag'));
  drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('drag');add(e.dataTransfer.files)});
  inp.addEventListener('change',()=>{add(inp.files);inp.value=""});
}
setupMultiDrop('dropPartners','filePartners','partners','partnerTags',/\.(png|jpg|jpeg|gif|svg|webp)$/);
setupMultiDrop('dropAudio','fileAudio','audio','audioTags',/\.mp3$/);

// ─── CSV drop ───
(function(){
  const drop=$('dropCSV'),inp=$('fileCSV'),tags=$('csvTags'),count=$('csvCount');
  const handle=f=>{if(!f)return;state.csv=f;tags.innerHTML=`<span class="tag">${f.name}<span class="rm">×</span></span>`;tags.querySelector('.rm').addEventListener('click',()=>{state.csv=null;tags.innerHTML='';count.style.display='none';state.roomCount=0;updateBtn()});const rd=new FileReader();rd.onload=e=>{const rooms=csvToRooms(e.target.result);state.roomCount=rooms.length;count.textContent=`✓ ${rooms.length} pannelli trovati`;count.style.display='block';updateBtn()};rd.readAsText(f)};
  drop.addEventListener('click',()=>inp.click());
  drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('drag')});
  drop.addEventListener('dragleave',()=>drop.classList.remove('drag'));
  drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('drag');handle(e.dataTransfer.files[0])});
  inp.addEventListener('change',()=>{handle(inp.files[0])});
})();

// ─── Generate ───
genBtn.addEventListener('click',async()=>{
  if(!state.name||!state.csv)return;
  genBtn.disabled=true;const setText=t=>{genBtn.textContent=t};
  setText('Caricamento...');
  try{
    const zip=new JSZip();const folder=zip.folder(state.name);
    setText('CSV → JSON...');
    const rooms=csvToRooms(await state.csv.text());
    folder.folder("data").file("rooms.json",JSON.stringify(rooms,null,2));
    folder.folder("css").file("style.css",TCSS.replace(/__PRIMARY__/g,state.color).replace(/__PRIMARY_LIGHT__/g,lighten(state.color)));
    folder.file("index.html",THTML.replace(/__TITLE__/g,state.name).replace(/__PRIMARY__/g,state.color));
    folder.folder("js").file("app.js",TJS);
    setText('Immagini...');
    const img=folder.folder("images");
    if(state.geniusLogo)img.file("genius-loci-logo.png",await f2b(state.geniusLogo),{base64:true});
    if(state.museumLogo){const ext=state.museumLogo.name.split(".").pop();img.file("museum-logo."+ext,await f2b(state.museumLogo),{base64:true})}
    for(let i=0;i<state.partners.length&&i<5;i++){const ext=state.partners[i].name.split(".").pop();img.file("partner-"+(i+1)+"."+ext,await f2b(state.partners[i]),{base64:true})}
    const af=folder.folder("audio");
    for(let i=0;i<state.audio.length;i++){setText(`Audio ${i+1}/${state.audio.length}`);af.file(state.audio[i].name,await f2b(state.audio[i]),{base64:true})}
    setText('ZIP...');
    const blob=await zip.generateAsync({type:"blob"},m=>setText(Math.round(m.percent)+"%"));
    const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=state.name+".zip";a.click();URL.revokeObjectURL(url);
    statusText.textContent=`✓ ${state.name}.zip — ${rooms.length} pannelli`;
  }catch(err){statusText.textContent="Errore: "+err.message;console.error(err)}
  updateBtn();
});
</script>
</body>
